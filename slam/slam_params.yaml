/slam_toolbox:
  ros__parameters:
    use_sim_time: true
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    scan_topic: /scan
    resolution: 0.1
    max_laser_range: 12.0
    qos_overrides:
      /scan:
        subscription:
          reliability: best_effort
          history: keep_last
          depth: 10
