# Pre-defined routes, in local NED metres relative to the launch point.
# Waypoints are [north_m, east_m]. Altitude/speed come from the mission plan.
routes:
  perimeter:
    description: "Square perimeter loop around the launch area, 40 m sides"
    waypoints:
      - [20, -20]
      - [20, 20]
      - [-20, 20]
      - [-20, -20]
      - [20, -20]   # close the loop
  inspection:
    description: "L-shaped inspection route along two fence lines"
    waypoints:
      - [0, 0]
      - [30, 0]
      - [30, 25]
      - [0, 0]      # return to start
  survey_lawnmower:
    description: "Lawnmower sweep of a 40x30 m area"
    waypoints:
      - [0, 0]
      - [40, 0]
      - [40, 10]
      - [0, 10]
      - [0, 20]
      - [40, 20]
      - [40, 30]
      - [0, 30]
  walls_loop:
    description: "Tight low loop in the box1/box2 corner; keeps two perpendicular walls in depth range for ICP"
    waypoints: [[2, 2], [2, -4], [-4, -4], [-4, 2]]
  walls_survey:
    description: "Coverage route past all four walls, rounding box1/box4 via the clear north side"
    waypoints: [[2, 2], [2, -6], [3, -6], [3, -9.5], [8, -9.5], [8, 1], [13, 1], [13, 16], [11.5, 16], [11.5, 10], [0, 10], [0, 8.5], [-6, 8.5], [11.5, 8.5], [11.5, 14], [-6, 14], [-6, 16], [-8, 16], [-8, 23], [-13, 23], [-13, 0], [2, 0], [2, 2]]